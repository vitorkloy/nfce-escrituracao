# Em cada push na main: incrementa patch no package.json, gera instalador Windows
# e publica no GitHub Releases (electron-updater + latest.yml).
# O commit do bump usa [skip ci] para não disparar este workflow em loop.
#
# Requisitos: branch main sem regra que impeça push do GITHUB_TOKEN; se houver,
# crie um PAT com escopo repo em Settings → Secrets → RELEASE_TOKEN e troque abaixo.

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Build and publish (Windows x64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:win

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "chore(release): bump version [skip ci]"
          git push
